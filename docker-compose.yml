version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: stats-ml-backend

    ports:
      - "8000:8000"

    environment:
      - MODEL_PATH=/app/models/loan_default_model.pkl

    restart: unless-stopped

    networks:
      - app-network


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: stats-ml-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000

    restart: unless-stopped

    networks:
      - app-network


networks:
  app-network:
    driver: bridge